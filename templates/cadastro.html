{% extends "layout.html" %}
{% block css_adicional %}
<link rel="stylesheet" href="{{url_for('static', filename = 'src/css/auth.css')}}">
{% endblock %}

{% block conteudo %}
<section class="auth-section">
    <div class="auth-container">
        <h1 class="auth-title">Crie sua conta</h1>
        <p class="auth-subtitle">Rápido, fácil e saboroso.</p>

        <form action="/cadastrar/cadastro" method="POST" class="auth-form">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Senha</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <button type="submit" class="button button--primary button--large" style="width: 100%;">CADASTRAR</button>
        </form>

        <p class="auth-footer">
            Já possui conta? <a href="/login">Faça login</a>
        </p>
    </div>
</section>
{% endblock %}
