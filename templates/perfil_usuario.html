{% extends "layout.html" %}
{% block css_adicional %}
<link rel="stylesheet" href="{{url_for('static', filename = 'src/css/perfil.css')}}">
{% endblock %}

{% block conteudo %}
<section class="profile-section">
    <div class="profile-container">
        <div class="profile-header">
            <h1 class="profile-title">Meu Perfil</h1>
            <a href="" class="button button--secondary">Sair</a>
        </div>

        <div class="profile-content">
            <aside class="profile-sidebar">
                <nav class="profile-nav">
                    <a href="#" class="profile-nav__link active">Dados Pessoais</a>
                    <a href="#" class="profile-nav__link">Meus Pedidos</a>
                    <a href="#" class="profile-nav__link">Endereços</a>
                </nav>
            </aside>

            <main class="profile-main">
                <form action="" method="POST" class="profile-form">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" value="{{ usuario.user_name }}" name="nome">
                    </div>
                    <button type="submit" class="button button--primary button-perfil">SALVAR ALTERAÇÕES</button>
                </form>
            </main>
        </div>
    </div>
</section>
{% endblock %}
