{% extends "layout.html" %}
{% block css_adicional %}
<link rel="stylesheet" href="{{url_for('static', filename = 'src/css/auth.css')}}">
{% endblock %}

{% block conteudo %}
<section class="auth-section">
    <div class="auth-container">
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Acesse sua conta para fazer seu pedido.</p>

        <form action="/logar" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Usuário</label>
                <input type="text" id="user" name="user" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="auth-actions">
                <button type="submit" class="button button--primary button--large">ENTRAR</button>
                <a href="#" class="auth-link">Esqueceu a senha?</a>
            </div>
        </form>

        <p class="auth-footer">
            Não tem uma conta? <a href="/logar">Cadastre-se aqui</a>
        </p>
    </div>
</section>
{% endblock %}
